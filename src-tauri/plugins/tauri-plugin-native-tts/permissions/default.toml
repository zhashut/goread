"$schema" = "schemas/schema.json"

[[permission]]
identifier = "allow-all"
description = "允许前端调用 native-tts 插件命令，并订阅插件事件。"
commands.allow = [
  "init",
  "set_rate",
  "set_voice",
  "get_all_voices",
  "set_media_session_active",
  "open_tts_settings",
  "install_tts_data",
  "shutdown",
  "tts_session_start",
  "tts_session_push",
  "tts_session_stop",
  "tts_session_pause",
  "tts_session_resume",
  "tts_session_set_rate",
  "tts_session_set_voice",
  "tts_session_set_end_of_book",
  "register_listener",
  "registerListener",
  "remove_listener"
]

[default]
description = "允许使用 native-tts 插件的基础能力与事件。"
permissions = ["allow-all"]

